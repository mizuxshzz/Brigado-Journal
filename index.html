<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Journal</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0b0d">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Syne:wght@800&display=swap" rel="stylesheet">

<style>

:root{

    --gold:#c5a059;
    --gold-soft:#f5d48f;

    --bg:#09090b;
    --bg-card:#131316;
    --bg-soft:#1a1a1f;

    --text:#f5f5f5;
    --text-soft:#a1a1aa;

    --border:rgba(255,255,255,.06);

    --serif:'Cormorant Garamond', serif;
    --sans:'Inter', sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:var(--sans);

    background:
    linear-gradient(rgba(5,5,8,.88),rgba(5,5,8,.94)),
    url('bg.jpg') center/cover no-repeat fixed;

    color:var(--text);

    min-height:100vh;

    overflow-x:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:#0b0b0d;
}

::-webkit-scrollbar-thumb{
    background:#2a2a30;
    border-radius:20px;
}

::-webkit-scrollbar-thumb:hover{
    background:var(--gold);
}

/* LAYOUT */

.wrapper{

    max-width:1450px;

    margin:auto;

    display:flex;
    flex-wrap:wrap;

    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:340px;

    padding:45px 28px;

    background:rgba(12,12,15,.95);

    border-right:1px solid var(--border);

    position:relative;
}

@media(max-width:920px){

    .sidebar{
        width:100%;
        border-right:none;
        border-bottom:1px solid var(--border);
    }

}

/* PROFILE */

.profile-wrap{
    text-align:center;
}

.profile-container{

    width:145px;
    height:145px;

    margin:auto;

    border-radius:50%;

    padding:4px;

    background:
    linear-gradient(
    135deg,
    rgba(245,212,143,.9),
    rgba(197,160,89,.4)
    );

    cursor:pointer;

    transition:.35s;
}

.profile-container:hover{
    transform:scale(1.03);
}

.profile-img{

    width:100%;
    height:100%;

    border-radius:50%;

    object-fit:cover;
}

.user-name{

    margin-top:25px;

    font-size:2.4rem;

    font-family:var(--serif);

    font-weight:600;
}

.user-bio{

    margin-top:6px;

    color:var(--gold);

    font-size:.78rem;

    letter-spacing:4px;

    text-transform:uppercase;
}

/* CLOCK */

.clock{

    margin-top:35px;

    padding:24px;

    border-radius:24px;

    background:var(--bg-card);

    border:1px solid var(--border);

    text-align:center;
}

.clock-time{

    font-size:2rem;

    font-weight:700;
}

.clock-date{

    margin-top:10px;

    color:var(--text-soft);

    font-size:.8rem;

    letter-spacing:2px;
}

/* MUSIC */

.music-box{

    margin-top:25px;

    background:var(--bg-card);

    border-radius:24px;

    border:1px solid var(--border);

    padding:22px;
}

.music-title{

    color:var(--gold);

    font-size:.8rem;

    letter-spacing:3px;

    text-transform:uppercase;

    margin-bottom:16px;
}

.music-ui{

    display:flex;
    align-items:center;
    gap:14px;
}

#musicToggle{

    width:52px;
    height:52px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
    135deg,
    var(--gold-soft),
    var(--gold)
    );

    color:#111;

    cursor:pointer;

    font-size:1rem;

    transition:.3s;
}

#musicToggle:hover{
    transform:scale(1.05);
}

.music-info{

    flex:1;
}

.music-name{

    font-weight:600;
}

.music-artist{

    margin-top:4px;

    color:var(--text-soft);

    font-size:.8rem;
}

/* MAIN */

.main{

    flex:1;

    padding:55px;

    background:rgba(9,9,11,.82);
}

@media(max-width:920px){

    .main{
        padding:28px;
    }

}

/* TITLE */

.section-title{

    font-size:3rem;

    font-family:var(--serif);

    margin-bottom:35px;
}

/* SEARCH */

.search{

    position:relative;

    margin-bottom:30px;
}

.search input{

    width:100%;

    padding:18px 20px;

    border:none;

    outline:none;

    border-radius:20px;

    background:var(--bg-card);

    border:1px solid var(--border);

    color:white;

    font-size:.95rem;
}

.search input:focus{
    border-color:rgba(197,160,89,.3);
}

/* FORM */

.form-box{

    background:var(--bg-card);

    border:1px solid var(--border);

    border-radius:30px;

    padding:35px;

    margin-bottom:45px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{

    display:block;

    margin-bottom:12px;

    font-size:.78rem;

    letter-spacing:3px;

    text-transform:uppercase;

    color:var(--text-soft);
}

.form-group input,
.form-group textarea,
.form-group select{

    width:100%;

    border:none;

    outline:none;

    border-radius:18px;

    background:var(--bg-soft);

    border:1px solid rgba(255,255,255,.04);

    color:white;

    padding:18px;
}

.form-group textarea{

    resize:none;

    height:170px;

    line-height:1.8;
}

/* BUTTON */

.btn{

    border:none;

    background:
    linear-gradient(
    135deg,
    var(--gold-soft),
    var(--gold)
    );

    color:#111;

    padding:15px 30px;

    border-radius:16px;

    cursor:pointer;

    font-weight:700;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

/* STATS */

.stats{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:18px;

    margin-bottom:45px;
}

.stat-card{

    background:var(--bg-card);

    border:1px solid var(--border);

    border-radius:24px;

    padding:28px;
}

.stat-title{

    color:var(--text-soft);

    font-size:.8rem;

    letter-spacing:2px;

    text-transform:uppercase;
}

.stat-number{

    margin-top:12px;

    font-size:2.2rem;

    font-family:var(--serif);
}

/* JOURNAL */

.journal-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

    gap:22px;
}

.card{

    background:var(--bg-card);

    border:1px solid var(--border);

    border-radius:28px;

    padding:30px;

    transition:.3s;
}

.card:hover{

    transform:translateY(-5px);

    border-color:rgba(197,160,89,.18);
}

.tag{

    display:inline-block;

    padding:7px 15px;

    border-radius:30px;

    background:rgba(197,160,89,.08);

    border:1px solid rgba(197,160,89,.15);

    color:var(--gold);

    font-size:.7rem;

    letter-spacing:2px;

    text-transform:uppercase;

    margin-bottom:18px;
}

.card-title{

    font-size:2rem;

    font-family:var(--serif);

    margin-bottom:16px;
}

.card-content{

    color:#c4c4cc;

    line-height:1.9;

    white-space:pre-line;
}

.card-footer{

    margin-top:28px;

    padding-top:20px;

    border-top:1px solid rgba(255,255,255,.05);

    display:flex;

    justify-content:space-between;

    align-items:center;
}

.card-date{

    color:var(--text-soft);

    font-size:.8rem;
}

.actions button{

    border:none;

    background:none;

    color:var(--text-soft);

    cursor:pointer;

    margin-left:15px;

    transition:.3s;
}

.actions button:hover{
    color:var(--gold);
}

/* TEAM */

.team{

    margin-top:60px;

    background:var(--bg-card);

    border:1px solid var(--border);

    border-radius:30px;

    padding:35px;
}

.team-title{

    font-size:2.5rem;

    font-family:var(--serif);

    margin-bottom:28px;
}

.team-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:18px;
}

.team-card{

    background:var(--bg-soft);

    border:1px solid rgba(255,255,255,.04);

    border-radius:22px;

    padding:22px;

    text-decoration:none;

    color:white;

    transition:.3s;
}

.team-card:hover{

    transform:translateY(-4px);

    border-color:rgba(197,160,89,.15);
}

.team-name{

    font-size:1.1rem;

    font-weight:600;
}

.team-role{

    margin-top:6px;

    color:var(--text-soft);

    font-size:.8rem;

    letter-spacing:2px;
}

/* FOOTER */

.footer{

    margin-top:55px;

    text-align:center;

    color:var(--text-soft);

    font-size:.8rem;

    letter-spacing:2px;
}

</style>

</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->

<aside class="sidebar">

    <div class="profile-wrap">

        <div class="profile-container"
        onclick="document.getElementById('profileUpload').click()">

            <img
            src=""
            id="profilePic"
            class="profile-img">

        </div>

        <input
        type="file"
        id="profileUpload"
        accept="image/*"
        hidden>

        <h1 class="user-name">
            The Journal
        </h1>

        <p class="user-bio">
            Brigado Team
        </p>

    </div>

    <!-- CLOCK -->

    <div class="clock">

        <div class="clock-time"
        id="clockTime">

            00:00:00

        </div>

        <div class="clock-date"
        id="clockDate">

            Loading...

        </div>

    </div>

    <!-- MUSIC -->

    <div class="music-box">

        <div class="music-title">
            Ambient Music
        </div>

        <div class="music-ui">

            <button id="musicToggle">
                ▶
            </button>

            <div class="music-info">

                <div class="music-name">
                    Snowfall Ambient
                </div>

                <div class="music-artist">
                    dark luxury atmosphere
                </div>

            </div>

        </div>

        <audio
        id="bgMusic"
        loop>

            <source src="https://mp3tourl.com/audio/1778657643441-92d3caae-eb7b-4ce2-a5fb-9ade3ad356ad.m4a" type="audio/mp3">

        </audio>

    </div>

</aside>

<!-- MAIN -->

<main class="main">

    <h1 class="section-title"
    id="formHeader">

        Tulis Jurnal Baru

    </h1>

    <!-- SEARCH -->

    <div class="search">

        <input
        type="text"
        id="searchInput"
        placeholder="Cari jurnal..."
        onkeyup="searchJournal()">

    </div>

    <!-- FORM -->

    <div class="form-box">

        <input type="hidden" id="editId">

        <div class="form-group">

            <label>Kategori</label>

            <select id="category">

                <option>Kebahagiaan</option>
                <option>Kesedihan</option>
                <option>Kebencian</option>
                <option>Kekecewaan</option>

            </select>

        </div>

        <div class="form-group">

            <label>Judul</label>

            <input
            type="text"
            id="title"
            placeholder="Masukkan judul jurnal...">

        </div>

        <div class="form-group">

            <label>Isi Jurnal</label>

            <textarea
            id="content"
            placeholder="Tuliskan isi jurnalmu..."></textarea>

        </div>

        <button
        class="btn"
        onclick="saveJournal()"
        id="saveBtn">

            Simpan Entri

        </button>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">

            <div class="stat-title">
                Total Journal
            </div>

            <div class="stat-number"
            id="totalJournal">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                Last Mood
            </div>

            <div class="stat-number"
            id="lastMood">

                -

            </div>

        </div>

    </div>

    <!-- JOURNAL -->

    <h1 class="section-title">
        Arsip Jurnal
    </h1>

    <div class="journal-grid"
    id="journalGrid"></div>

    <!-- TEAM -->

    <div class="team">

        <h2 class="team-title">
            Brigado Team
        </h2>

        <div class="team-grid">

            <a
            href="https://t.me/afteryourlife"
            class="team-card"
            target="_blank">

                <div class="team-name">
                    Gabriel
                </div>

                <div class="team-role">
                    Founder & Writer
                </div>

            </a>

            <a
            href="https://t.me/beforeyourlife"
            class="team-card"
            target="_blank">

                <div class="team-name">
                    Nayoung
                </div>

                <div class="team-role">
                    Designer
                </div>

            </a>

            <a
            href="https://t.me/ifyousmile"
            class="team-card"
            target="_blank">

                <div class="team-name">
                    Melvin
                </div>

                <div class="team-role">
                    Fixed Errors
                </div>

            </a>

        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        © 2026 Brigado Team

    </div>

</main>

</div>

<script>

/* PROFILE */

const profileUpload =
document.getElementById('profileUpload');

const profilePic =
document.getElementById('profilePic');

const defaultProfile =
'https://i.imgur.com/8Q89fF4.jpg';

const savedProfile =
localStorage.getItem('gentleman_profile');

profilePic.src =
savedProfile
? savedProfile
: defaultProfile;

profileUpload.addEventListener('change', function(){

    const file = this.files[0];

    if(file){

        const reader =
        new FileReader();

        reader.onload = function(e){

            profilePic.src =
            e.target.result;

            localStorage.setItem(
            'gentleman_profile',
            e.target.result
            );

        }

        reader.readAsDataURL(file);

    }

});

/* CLOCK */

function updateClock(){

    const now =
    new Date();

    document.getElementById('clockTime')
    .innerHTML =
    now.toLocaleTimeString('id-ID');

    document.getElementById('clockDate')
    .innerHTML =
    now.toLocaleDateString(
    'id-ID',
    {
        weekday:'long',
        day:'numeric',
        month:'long',
        year:'numeric'
    });

}

setInterval(updateClock,1000);

updateClock();

/* MUSIC */

const music =
document.getElementById('bgMusic');

const musicToggle =
document.getElementById('musicToggle');

let playing = false;

musicToggle.onclick = () => {

    if(!playing){

        music.play();

        musicToggle.innerHTML = '❚❚';

    } else {

        music.pause();

        musicToggle.innerHTML = '▶';
    }

    playing = !playing;
}

/* JOURNAL */

let journals =
JSON.parse(
localStorage.getItem('gentleman_journals')
) || [];

function updateStats(){

    document.getElementById('totalJournal')
    .innerHTML =
    journals.length;

    document.getElementById('lastMood')
    .innerHTML =
    journals.length > 0
    ? journals[0].category
    : '-';

}

function renderJournals(data = journals){

    const grid =
    document.getElementById('journalGrid');

    grid.innerHTML = '';

    if(data.length === 0){

        grid.innerHTML = `
        <p style="
        color:#999;
        font-size:1rem;
        ">
        Belum ada jurnal.
        </p>
        `;

        return;
    }

    data.forEach(j => {

        const card =
        document.createElement('div');

        card.className = 'card';

        card.innerHTML = `

        <div class="tag">
            ${j.category}
        </div>

        <div class="card-title">
            ${j.title}
        </div>

        <div class="card-content">
            ${j.content}
        </div>

        <div class="card-footer">

            <div class="card-date">
                ${j.date}
            </div>

            <div class="actions">

                <button onclick="editJournal(${j.id})">
                    Edit
                </button>

                <button onclick="deleteJournal(${j.id})">
                    Hapus
                </button>

            </div>

        </div>
        `;

        grid.appendChild(card);

    });

    updateStats();

}

function saveJournal(){

    const idInput =
    document.getElementById('editId').value;

    const category =
    document.getElementById('category').value;

    const title =
    document.getElementById('title').value;

    const content =
    document.getElementById('content').value;

    if(!title.trim() || !content.trim()){

        alert(
        "Judul dan isi jurnal tidak boleh kosong."
        );

        return;
    }

    if(idInput){

        const index =
        journals.findIndex(
        j => j.id == idInput
        );

        journals[index].category =
        category;

        journals[index].title =
        title;

        journals[index].content =
        content;

    } else {

        journals.unshift({

            id:Date.now(),

            category,
            title,
            content,

            date:
            new Date().toLocaleDateString(
            'id-ID',
            {
                day:'numeric',
                month:'long',
                year:'numeric'
            })

        });

    }

    localStorage.setItem(
    'gentleman_journals',
    JSON.stringify(journals)
    );

    document.getElementById('editId').value = '';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';

    renderJournals();

}

function editJournal(id){

    const journal =
    journals.find(j => j.id === id);

    if(!journal) return;

    document.getElementById('editId').value =
    journal.id;

    document.getElementById('category').value =
    journal.category;

    document.getElementById('title').value =
    journal.title;

    document.getElementById('content').value =
    journal.content;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });

}

function deleteJournal(id){

    if(confirm('Hapus jurnal ini?')){

        journals =
        journals.filter(
        j => j.id !== id
        );

        localStorage.setItem(
        'gentleman_journals',
        JSON.stringify(journals)
        );

        renderJournals();

    }

}

function searchJournal(){

    const keyword =
    document.getElementById('searchInput')
    .value
    .toLowerCase();

    const filtered =
    journals.filter(j =>

        j.title
        .toLowerCase()
        .includes(keyword)

        ||

        j.content
        .toLowerCase()
        .includes(keyword)

        ||

        j.category
        .toLowerCase()
        .includes(keyword)

    );

    renderJournals(filtered);

}

renderJournals();

</script>

</body>
</html>
