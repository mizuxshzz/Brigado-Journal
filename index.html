<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>The Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

:root{
    --gold:#c5a059;
    --white:#f5f5f5;
    --soft:#a4a4ad;
    --bg:#0c0c0f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.88)),
    url('https://ibb.co.com/pB7trFY8')
    center/cover no-repeat fixed;

    color:var(--white);
    min-height:100vh;
}

/* WRAPPER */

.wrapper{
    max-width:1350px;
    margin:auto;
    display:flex;
    flex-wrap:wrap;
}

/* SIDEBAR */

.sidebar{
    width:320px;
    padding:40px 25px;
    background:rgba(15,15,18,.82);
    border-right:1px solid rgba(255,255,255,.05);
}

@media(max-width:900px){
    .sidebar{
        width:100%;
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,.05);
    }
}

/* PROFILE */

.profile-container{
    width:140px;
    height:140px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(197,160,89,.35);
    cursor:pointer;
    transition:.3s;
}

.profile-container:hover{
    transform:scale(1.03);
}

.profile-img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.user-name{
    text-align:center;
    margin-top:25px;
    font-family:'Cormorant Garamond',serif;
    font-size:2.1rem;
}

.user-bio{
    text-align:center;
    color:var(--gold);
    font-size:.82rem;
    letter-spacing:3px;
    margin-top:6px;
}

/* CLOCK */

.clock{
    margin-top:30px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:20px;
    padding:20px;
    text-align:center;
}

.clock-time{
    font-size:2rem;
    font-weight:700;
}

.clock-date{
    margin-top:8px;
    color:var(--soft);
    font-size:.82rem;
}

/* MUSIC */

.music-box{
    margin-top:25px;
    background:rgba(255,255,255,.03);
    border-radius:20px;
    padding:20px;
    border:1px solid rgba(255,255,255,.05);
}

.music-title{
    margin-bottom:12px;
    font-size:.8rem;
    letter-spacing:3px;
    color:var(--gold);
}

.music-box audio{
    width:100%;
    height:42px;
    opacity:.88;
}

/* MAIN */

.main{
    flex:1;
    padding:45px;
    background:rgba(10,10,12,.72);
}

@media(max-width:900px){
    .main{
        padding:25px;
    }
}

/* TITLE */

.title{
    font-family:'Cormorant Garamond',serif;
    font-size:3rem;
    margin-bottom:30px;
}

/* SEARCH */

.search{
    position:relative;
    margin-bottom:30px;
}

.search i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:var(--soft);
}

.search input{
    width:100%;
    padding:16px 16px 16px 48px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,.05);
    color:white;
}

/* FORM */

.form-box{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:25px;
    padding:30px;
    margin-bottom:40px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    color:var(--soft);
    font-size:.8rem;
    letter-spacing:2px;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    border:none;
    outline:none;
    border-radius:15px;
    padding:16px;
    background:rgba(255,255,255,.05);
    color:white;
}

.form-group textarea{
    resize:none;
    height:150px;
}

.btn{
    border:none;
    background:linear-gradient(135deg,#f5d48f,#c5a059);
    color:#111;
    padding:14px 30px;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
    margin-bottom:40px;
}

.stat-card{
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
}

.stat-title{
    color:var(--soft);
    font-size:.8rem;
    letter-spacing:2px;
}

.stat-number{
    margin-top:10px;
    font-size:2rem;
    font-family:'Cormorant Garamond',serif;
}

/* JOURNAL */

.journal-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:25px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:rgba(197,160,89,.25);
}

.tag{
    display:inline-block;
    padding:6px 14px;
    border-radius:20px;
    background:rgba(197,160,89,.08);
    border:1px solid rgba(197,160,89,.15);
    color:var(--gold);
    font-size:.72rem;
    margin-bottom:18px;
}

.card-title{
    font-size:1.7rem;
    font-family:'Cormorant Garamond',serif;
    margin-bottom:15px;
}

.card-content{
    color:#c7c7cf;
    line-height:1.8;
    white-space:pre-line;
}

.card-footer{
    margin-top:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card-date{
    color:var(--soft);
    font-size:.8rem;
}

.actions button{
    background:none;
    border:none;
    color:var(--soft);
    cursor:pointer;
    margin-left:12px;
}

/* TEAM */

.team{
    margin-top:55px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
}

.team-title{
    font-family:'Cormorant Garamond',serif;
    font-size:2.4rem;
    margin-bottom:25px;
}

.team-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:18px;
}

.team-card{
    display:flex;
    gap:15px;
    align-items:center;
    padding:20px;
    border-radius:20px;
    text-decoration:none;
    background:rgba(255,255,255,.03);
    color:white;
    border:1px solid rgba(255,255,255,.05);
}

.team-card i{
    font-size:1.5rem;
    color:var(--gold);
}

.team-role{
    color:var(--soft);
    font-size:.8rem;
    margin-top:4px;
}

.footer{
    margin-top:45px;
    text-align:center;
    color:var(--soft);
    font-size:.82rem;
}

</style>
</head>
<body>

<div class="wrapper">

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="profile-container"
    onclick="document.getElementById('profileUpload').click()">

        <img src=""
        id="profilePic"
        class="profile-img">

    </div>

    <input type="file"
    id="profileUpload"
    accept="image/*"
    hidden>

    <h1 class="user-name">
        The Journal
    </h1>

    <p class="user-bio">
        BRIGADO TEAM
    </p>

    <div class="clock">

        <div class="clock-time" id="clockTime">
            00:00:00
        </div>

        <div class="clock-date" id="clockDate">
            Loading...
        </div>

    </div>

    <div class="music-box">

        <div class="music-title">
            AMBIENT MUSIC
        </div>

        <audio controls loop>

            <source
            src="https://mp3tourl.com/audio/1778657643441-92d3caae-eb7b-4ce2-a5fb-9ade3ad356ad.m4a">

        </audio>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <h1 class="title" id="formHeader">
        Tulis Jurnal Baru
    </h1>

    <div class="search">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
        type="text"
        id="searchInput"
        placeholder="Cari jurnal..."
        onkeyup="searchJournal()">

    </div>

    <div class="form-box">

        <input type="hidden" id="editId">

        <div class="form-group">

            <label>Kategori</label>

            <select id="category">

                <option>Kebahagiaan</option>
                <option>Kesedihan</option>
                <option>Kebencian</option>
                <option>Kekecewaan</option>

            </select>

        </div>

        <div class="form-group">

            <label>Judul</label>

            <input
            type="text"
            id="title"
            placeholder="Masukkan judul jurnal...">

        </div>

        <div class="form-group">

            <label>Isi Jurnal</label>

            <textarea
            id="content"
            placeholder="Tuliskan isi jurnalmu..."></textarea>

        </div>

        <button class="btn"
        onclick="saveJournal()"
        id="saveBtn">

            Simpan Entri

        </button>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">

            <div class="stat-title">
                TOTAL JOURNAL
            </div>

            <div class="stat-number"
            id="totalJournal">

                0

            </div>

        </div>

        <div class="stat-card">

            <div class="stat-title">
                LAST MOOD
            </div>

            <div class="stat-number"
            id="lastMood">

                -

            </div>

        </div>

    </div>

    <h1 class="title">
        Arsip Jurnal
    </h1>

    <div class="journal-grid"
    id="journalGrid"></div>

    <!-- TEAM -->

    <div class="team">

        <h2 class="team-title">
            Brigado Team
        </h2>

        <div class="team-grid">

            <a href="https://t.me/afteryourlife"
            class="team-card"
            target="_blank">

                <i class="fa-brands fa-telegram"></i>

                <div>

                    <div>Gabriel</div>

                    <div class="team-role">
                        Founder & Writer
                    </div>

                </div>

            </a>

            <a href="https://t.me/beforeyourlife"
            class="team-card"
            target="_blank">

                <i class="fa-brands fa-telegram"></i>

                <div>

                    <div>Nayoung</div>

                    <div class="team-role">
                        Designer
                    </div>

                </div>

            </a>

            <a href="https://t.me/ifyousmile"
            class="team-card"
            target="_blank">

                <i class="fa-brands fa-telegram"></i>

                <div>

                    <div>Melvin</div>

                    <div class="team-role">
                        Fixed Errors
                    </div>

                </div>

            </a>

        </div>

    </div>

    <div class="footer">

        © 2026 Brigado Team

    </div>

</div>

</div>

<script>

/* PROFILE */

const profileUpload =
document.getElementById('profileUpload');

const profilePic =
document.getElementById('profilePic');

const defaultProfile =
'https://i.imgur.com/8Q89fF4.jpg';

const savedProfile =
localStorage.getItem('gentleman_profile');

profilePic.src =
savedProfile ? savedProfile : defaultProfile;

profileUpload.addEventListener('change', function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            profilePic.src = e.target.result;

            localStorage.setItem(
                'gentleman_profile',
                e.target.result
            );

        }

        reader.readAsDataURL(file);

    }

});

/* CLOCK */

function updateClock(){

    const now = new Date();

    document.getElementById('clockTime').innerHTML =
    now.toLocaleTimeString('id-ID');

    document.getElementById('clockDate').innerHTML =
    now.toLocaleDateString('id-ID', {
        weekday:'long',
        day:'numeric',
        month:'long',
        year:'numeric'
    });

}

setInterval(updateClock,1000);

updateClock();

/* JOURNAL */

let journals =
JSON.parse(
localStorage.getItem('gentleman_journals')
) || [];

function updateStats(){

    document.getElementById('totalJournal').innerHTML =
    journals.length;

    document.getElementById('lastMood').innerHTML =
    journals.length > 0
    ? journals[0].category
    : '-';

}

function renderJournals(data = journals){

    const grid =
    document.getElementById('journalGrid');

    grid.innerHTML = '';

    if(data.length === 0){

        grid.innerHTML = `
        <p style="color:#999;">
        Belum ada jurnal.
        </p>
        `;

        return;

    }

    data.forEach(j => {

        const card =
        document.createElement('div');

        card.className = 'card';

        card.innerHTML = `

        <div class="tag">
            ${j.category}
        </div>

        <div class="card-title">
            ${j.title}
        </div>

        <div class="card-content">
            ${j.content}
        </div>

        <div class="card-footer">

            <div class="card-date">
                ${j.date}
            </div>

            <div class="actions">

                <button onclick="editJournal(${j.id})">
                    Edit
                </button>

                <button onclick="deleteJournal(${j.id})">
                    Hapus
                </button>

            </div>

        </div>
        `;

        grid.appendChild(card);

    });

    updateStats();

}

function saveJournal(){

    const idInput =
    document.getElementById('editId').value;

    const category =
    document.getElementById('category').value;

    const title =
    document.getElementById('title').value;

    const content =
    document.getElementById('content').value;

    if(!title.trim() || !content.trim()){

        alert("Judul dan isi jurnal tidak boleh kosong.");

        return;

    }

    if(idInput){

        const index =
        journals.findIndex(j => j.id == idInput);

        journals[index].category = category;
        journals[index].title = title;
        journals[index].content = content;

    } else {

        journals.unshift({

            id:Date.now(),
            category,
            title,
            content,

            date:
            new Date().toLocaleDateString(
            'id-ID',
            {
                day:'numeric',
                month:'long',
                year:'numeric'
            })

        });

    }

    localStorage.setItem(
        'gentleman_journals',
        JSON.stringify(journals)
    );

    document.getElementById('editId').value = '';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';

    renderJournals();

}

function editJournal(id){

    const journal =
    journals.find(j => j.id === id);

    if(!journal) return;

    document.getElementById('editId').value =
    journal.id;

    document.getElementById('category').value =
    journal.category;

    document.getElementById('title').value =
    journal.title;

    document.getElementById('content').value =
    journal.content;

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });

}

function deleteJournal(id){

    if(confirm('Hapus jurnal ini?')){

        journals =
        journals.filter(j => j.id !== id);

        localStorage.setItem(
            'gentleman_journals',
            JSON.stringify(journals)
        );

        renderJournals();

    }

}

function searchJournal(){

    const keyword =
    document.getElementById('searchInput')
    .value
    .toLowerCase();

    const filtered =
    journals.filter(j =>

        j.title.toLowerCase().includes(keyword)
        ||
        j.content.toLowerCase().includes(keyword)
        ||
        j.category.toLowerCase().includes(keyword)

    );

    renderJournals(filtered);

}

renderJournals();

</script>

</body>
</html>
