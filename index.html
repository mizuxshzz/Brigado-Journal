<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>The Journal</title>

<!-- GOOGLE FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

:root{

    --accent-gold:#c5a059;
    --accent-soft:#f5d48f;

    --text-primary:#f8f8f8;
    --text-secondary:#b5b5c3;

    --glass-bg:rgba(18,18,22,.62);
    --glass-border:rgba(255,255,255,.08);

    --font-serif:'Cormorant Garamond', serif;
    --font-sans:'Inter', sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{

    font-family:var(--font-sans);

    background:
    radial-gradient(circle at top left, rgba(197,160,89,.12), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,255,255,.04), transparent 25%),
    linear-gradient(rgba(5,5,8,.82), rgba(5,5,8,.94)),
    url('https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=2070&auto=format&fit=crop')
    no-repeat center center fixed;

    background-size:cover;

    min-height:100vh;

    color:var(--text-primary);

    overflow-x:hidden;
}

/* AMBIENT */

.ambient{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

.ambient-1{
    width:300px;
    height:300px;
    background:rgba(197,160,89,.15);
    top:-50px;
    left:-50px;
}

.ambient-2{
    width:400px;
    height:400px;
    background:rgba(255,255,255,.05);
    bottom:-100px;
    right:-100px;
}

/* PARTICLES */

.particles{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.particles span{
    position:absolute;
    width:3px;
    height:3px;
    border-radius:50%;
    background:rgba(255,255,255,.35);

    animation:floatParticle linear infinite;
}

.particles span:nth-child(1){
    left:10%;
    animation-duration:14s;
    animation-delay:1s;
}

.particles span:nth-child(2){
    left:20%;
    animation-duration:18s;
    animation-delay:2s;
}

.particles span:nth-child(3){
    left:40%;
    animation-duration:13s;
    animation-delay:3s;
}

.particles span:nth-child(4){
    left:55%;
    animation-duration:16s;
    animation-delay:2s;
}

.particles span:nth-child(5){
    left:70%;
    animation-duration:20s;
    animation-delay:1s;
}

.particles span:nth-child(6){
    left:85%;
    animation-duration:15s;
    animation-delay:5s;
}

@keyframes floatParticle{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-20vh);
        opacity:0;
    }
}

/* LAYOUT */

.layout-wrapper{

    width:100%;
    max-width:1450px;

    margin:auto;

    min-height:100vh;

    display:flex;
    flex-direction:column;

    box-shadow:
    0 0 80px rgba(0,0,0,.7);

    backdrop-filter:blur(20px);
}

@media(min-width:900px){

    .layout-wrapper{
        flex-direction:row;
    }

}

/* SIDEBAR */

.sidebar{

    width:100%;

    padding:60px 30px;

    background:rgba(15,15,18,.58);

    backdrop-filter:blur(40px);

    border-right:1px solid var(--glass-border);

    display:flex;
    flex-direction:column;
    align-items:center;

    position:relative;
    overflow:hidden;
}

@media(min-width:900px){

    .sidebar{
        width:360px;
    }

}

.sidebar::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.08),
    transparent 30%
    );

    pointer-events:none;
}

/* PROFILE */

.profile-container{

    position:relative;

    width:155px;
    height:155px;

    border-radius:50%;

    padding:5px;

    margin-bottom:30px;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    rgba(197,160,89,.95),
    rgba(255,255,255,.15),
    rgba(197,160,89,.3)
    );

    box-shadow:
    0 0 40px rgba(197,160,89,.18),
    0 10px 40px rgba(0,0,0,.55);

    transition:.5s ease;

    animation:profileFloat 5s ease-in-out infinite;
}

@keyframes profileFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

.profile-container:hover{

    transform:translateY(-6px) scale(1.03);

    box-shadow:
    0 0 60px rgba(197,160,89,.35),
    0 20px 50px rgba(0,0,0,.75);
}

.profile-img{

    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:50%;
}

.profile-overlay{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    opacity:0;

    font-size:.8rem;

    letter-spacing:2px;

    text-transform:uppercase;

    font-weight:600;

    transition:.4s ease;
}

.profile-container:hover .profile-img{
    filter:brightness(.45);
}

.profile-container:hover .profile-overlay{
    opacity:1;
}

.user-name{

    font-family:var(--font-serif);

    font-size:2.2rem;

    font-weight:600;

    letter-spacing:1px;

    margin-bottom:8px;
}

.user-bio{

    color:var(--accent-gold);

    font-size:.85rem;

    letter-spacing:4px;

    text-transform:uppercase;
}

/* LIVE CLOCK */

.live-clock{

    margin-top:30px;

    padding:18px 28px;

    border-radius:22px;

    background:
    linear-gradient(
    145deg,
    rgba(255,255,255,.05),
    rgba(255,255,255,.02)
    );

    border:1px solid rgba(255,255,255,.06);

    text-align:center;

    width:100%;
}

.clock-time{

    font-size:2rem;

    font-weight:700;

    letter-spacing:2px;
}

.clock-date{

    margin-top:8px;

    color:var(--text-secondary);

    font-size:.8rem;

    letter-spacing:3px;

    text-transform:uppercase;
}

/* MUSIC */

.music-player{

    margin-top:30px;

    width:100%;

    padding:25px;

    border-radius:28px;

    background:
    linear-gradient(
    145deg,
    rgba(30,30,34,.72),
    rgba(18,18,20,.45)
    );

    border:1px solid rgba(255,255,255,.06);
}

.music-title{

    font-size:.85rem;

    letter-spacing:3px;

    text-transform:uppercase;

    color:var(--accent-gold);

    margin-bottom:15px;
}

.music-player audio{
    width:100%;
    filter:invert(1) brightness(.85);
}

/* MAIN */

.main-content{

    flex:1;

    padding:45px 25px;

    background:rgba(8,8,10,.45);

    backdrop-filter:blur(15px);

    position:relative;
}

@media(min-width:900px){

    .main-content{
        padding:60px 70px;
    }

}

.main-content::before{

    content:"";

    position:absolute;

    top:-200px;
    right:-100px;

    width:500px;
    height:500px;

    background:
    radial-gradient(
    circle,
    rgba(197,160,89,.08),
    transparent 70%
    );

    pointer-events:none;
}

/* TITLE */

.section-title{

    font-family:var(--font-serif);

    font-size:3rem;

    font-weight:600;

    margin-bottom:35px;

    letter-spacing:1px;

    position:relative;
}

.section-title::after{

    content:"";

    position:absolute;

    left:0;
    bottom:-12px;

    width:120px;
    height:2px;

    background:
    linear-gradient(
    90deg,
    var(--accent-gold),
    transparent
    );
}

/* SEARCH */

.search-box{

    margin-bottom:35px;

    position:relative;
}

.search-box i{

    position:absolute;

    top:50%;
    left:22px;

    transform:translateY(-50%);

    color:var(--text-secondary);
}

.search-input{

    width:100%;

    padding:18px 20px 18px 55px;

    border-radius:22px;

    border:1px solid rgba(255,255,255,.06);

    background:rgba(0,0,0,.35);

    color:white;

    outline:none;

    transition:.4s ease;
}

.search-input:focus{

    border-color:rgba(197,160,89,.3);

    box-shadow:
    0 0 30px rgba(197,160,89,.12);
}

/* EDITOR */

.editor-container{

    background:
    linear-gradient(
    145deg,
    rgba(28,28,32,.72),
    rgba(15,15,18,.5)
    );

    border:1px solid rgba(255,255,255,.06);

    border-radius:28px;

    padding:38px;

    margin-bottom:60px;

    backdrop-filter:blur(30px);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

    animation:fadeUp .8s ease;
}

.form-group{
    margin-bottom:26px;
}

.form-label{

    display:block;

    margin-bottom:12px;

    color:var(--text-secondary);

    font-size:.78rem;

    text-transform:uppercase;

    letter-spacing:3px;
}

.form-input,
.form-textarea,
.form-select{

    width:100%;

    background:rgba(0,0,0,.35);

    border:1px solid rgba(255,255,255,.06);

    color:white;

    padding:18px 20px;

    border-radius:18px;

    outline:none;

    font-size:.95rem;

    transition:.4s ease;

    font-family:var(--font-sans);
}

.form-textarea{

    height:180px;

    resize:none;

    line-height:1.8;
}

.form-input:focus,
.form-textarea:focus,
.form-select:focus{

    border-color:rgba(197,160,89,.4);

    box-shadow:
    0 0 30px rgba(197,160,89,.12);

    background:rgba(0,0,0,.55);
}

/* BUTTON */

.btn{

    background:
    linear-gradient(
    135deg,
    #f5d48f,
    #c5a059
    );

    color:#111;

    border:none;

    padding:15px 35px;

    border-radius:16px;

    cursor:pointer;

    font-weight:700;

    letter-spacing:1px;

    transition:.4s ease;

    box-shadow:
    0 10px 30px rgba(197,160,89,.2);
}

.btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 18px 40px rgba(197,160,89,.35);
}

.btn-cancel{

    margin-left:14px;

    background:transparent;

    color:var(--text-secondary);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:none;
}

.btn-cancel:hover{

    background:rgba(255,255,255,.05);

    color:white;
}

/* GRID */

.journal-grid{

    display:grid;

    grid-template-columns:1fr;

    gap:28px;
}

@media(min-width:1100px){

    .journal-grid{
        grid-template-columns:repeat(2,1fr);
    }

}

/* CARD */

.journal-card{

    background:
    linear-gradient(
    145deg,
    rgba(30,30,34,.72),
    rgba(18,18,20,.45)
    );

    border:1px solid rgba(255,255,255,.06);

    border-radius:26px;

    padding:35px;

    position:relative;

    overflow:hidden;

    backdrop-filter:blur(30px);

    transition:
    transform .5s ease,
    box-shadow .5s ease,
    border .5s ease;

    animation:fadeUp .8s ease;
}

.journal-card::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:2px;

    background:
    linear-gradient(
    90deg,
    transparent,
    var(--accent-gold),
    transparent
    );

    opacity:0;

    transition:.5s ease;
}

.journal-card:hover{

    transform:translateY(-10px);

    border:1px solid rgba(197,160,89,.2);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45),
    0 0 40px rgba(197,160,89,.08);
}

.journal-card:hover::before{
    opacity:1;
}

.card-header{

    display:flex;

    justify-content:space-between;

    margin-bottom:20px;
}

.category-tag{

    padding:7px 16px;

    border-radius:30px;

    font-size:.7rem;

    letter-spacing:2px;

    text-transform:uppercase;

    color:var(--accent-gold);

    border:1px solid rgba(197,160,89,.2);

    background:rgba(197,160,89,.08);
}

.card-title{

    font-family:var(--font-serif);

    font-size:2rem;

    margin-bottom:18px;

    line-height:1.2;
}

.card-body{

    color:var(--text-secondary);

    line-height:1.9;

    font-size:.95rem;

    white-space:pre-line;

    margin-bottom:30px;
}

.card-footer{

    display:flex;

    justify-content:space-between;

    align-items:center;

    border-top:1px solid rgba(255,255,255,.05);

    padding-top:20px;
}

.card-date{

    color:var(--text-secondary);

    font-style:italic;

    font-size:.85rem;
}

.card-actions button{

    background:none;

    border:none;

    cursor:pointer;

    color:var(--text-secondary);

    text-transform:uppercase;

    letter-spacing:2px;

    font-size:.72rem;

    margin-left:18px;

    transition:.3s ease;
}

.btn-edit:hover{
    color:var(--accent-gold);
}

.btn-delete:hover{
    color:#ff5c5c;
}

/* STATS */

.stats-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:60px;
}

.stat-card{

    padding:30px;

    border-radius:28px;

    background:
    linear-gradient(
    145deg,
    rgba(30,30,34,.72),
    rgba(18,18,20,.45)
    );

    border:1px solid rgba(255,255,255,.06);

    backdrop-filter:blur(30px);
}

.stat-title{

    color:var(--text-secondary);

    font-size:.8rem;

    letter-spacing:3px;

    text-transform:uppercase;
}

.stat-number{

    margin-top:14px;

    font-size:2.5rem;

    font-weight:700;

    font-family:var(--font-serif);
}

/* TEAM */

.brigado-team{

    margin-top:70px;

    padding:40px;

    border-radius:30px;

    background:
    linear-gradient(
    145deg,
    rgba(30,30,34,.72),
    rgba(18,18,20,.45)
    );

    border:1px solid rgba(255,255,255,.06);

    backdrop-filter:blur(30px);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

    position:relative;

    overflow:hidden;
}

.brigado-team::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:2px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(197,160,89,.8),
    transparent
    );
}

.team-title{

    font-family:var(--font-serif);

    font-size:2.8rem;

    margin-bottom:30px;

    color:white;
}

.team-grid{

    display:grid;

    grid-template-columns:1fr;

    gap:20px;
}

@media(min-width:700px){

    .team-grid{
        grid-template-columns:repeat(2,1fr);
    }

}

.team-card{

    display:flex;

    align-items:center;

    gap:18px;

    padding:22px;

    border-radius:24px;

    text-decoration:none;

    background:
    linear-gradient(
    145deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
    );

    border:1px solid rgba(255,255,255,.05);

    transition:.45s ease;
}

.team-card:hover{

    transform:translateY(-6px);

    border-color:rgba(197,160,89,.2);

    box-shadow:
    0 15px 40px rgba(0,0,0,.35),
    0 0 30px rgba(197,160,89,.08);
}

.tele-icon{

    min-width:65px;

    height:65px;

    border-radius:20px;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
    135deg,
    rgba(197,160,89,.18),
    rgba(255,255,255,.04)
    );

    border:1px solid rgba(255,255,255,.06);

    font-size:1.7rem;

    color:#fff;
}

.team-info{

    display:flex;

    flex-direction:column;
}

.team-name{

    color:white;

    font-size:1.2rem;

    font-weight:600;
}

.team-role{

    margin-top:4px;

    color:#9c9cad;

    font-size:.82rem;

    letter-spacing:2px;

    text-transform:uppercase;
}

/* FOOTER */

.footer{

    margin-top:60px;

    text-align:center;

    color:var(--text-secondary);

    font-size:.85rem;

    letter-spacing:2px;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:#0b0b0d;
}

::-webkit-scrollbar-thumb{

    background:rgba(255,255,255,.15);

    border-radius:20px;
}

::-webkit-scrollbar-thumb:hover{
    background:var(--accent-gold);
}

/* ANIMATION */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="layout-wrapper">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="profile-container"
        onclick="document.getElementById('profileUpload').click()">

            <img src=""
            id="profilePic"
            class="profile-img">

            <div class="profile-overlay">
                Ubah Foto
            </div>

        </div>

        <input type="file"
        id="profileUpload"
        accept="image/*"
        hidden>

        <h2 class="user-name">
            The Journal
        </h2>

        <p class="user-bio">
            Brigado Team
        </p>

        <!-- LIVE CLOCK -->

        <div class="live-clock">

            <div class="clock-time" id="clockTime">
                00:00:00
            </div>

            <div class="clock-date" id="clockDate">
                Loading...
            </div>

        </div>

        <!-- MUSIC -->

        <div class="music-player">

            <div class="music-title">
                Ambient Music
            </div>

            <audio controls loop>

                <source
                src="https://mp3tourl.com/audio/1778657643441-92d3caae-eb7b-4ce2-a5fb-9ade3ad356ad.m4a"
                type="audio/mp3">

            </audio>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <h1 class="section-title" id="formHeader">
            Tulis Jurnal Baru
        </h1>

        <!-- SEARCH -->

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Cari jurnal..."
            onkeyup="searchJournal()"
            >

        </div>

        <!-- EDITOR -->

        <div class="editor-container">

            <input type="hidden" id="editId">

            <div class="form-group">

                <label class="form-label">
                    Kategori
                </label>

                <select id="category"
                class="form-select">

                    <option value="Kebahagiaan">
                        Kebahagiaan
                    </option>

                    <option value="Kesedihan">
                        Kesedihan
                    </option>

                    <option value="Kebencian">
                        Kebencian
                    </option>

                    <option value="Kekecewaan">
                        Kekecewaan
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Judul
                </label>

                <input
                type="text"
                id="title"
                class="form-input"
                placeholder="Masukkan judul jurnal..."
                >

            </div>

            <div class="form-group">

                <label class="form-label">
                    Isi Jurnal
                </label>

                <textarea
                id="content"
                class="form-textarea"
                placeholder="Tuliskan isi jurnalmu di sini..."
                ></textarea>

            </div>

            <button class="btn"
            id="saveBtn"
            onclick="saveJournal()">

                Simpan Entri

            </button>

            <button
            class="btn btn-cancel"
            id="cancelBtn"
            onclick="cancelEdit()"
            style="display:none;"
            >

                Batal

            </button>

        </div>

        <!-- STATS -->

        <div class="stats-grid">

            <div class="stat-card">

                <div class="stat-title">
                    Total Journal
                </div>

                <div class="stat-number" id="totalJournal">
                    0
                </div>

            </div>

            <div class="stat-card">

                <div class="stat-title">
                    Last Mood
                </div>

                <div class="stat-number"
                id="lastMood"
                style="font-size:1.5rem;">
                    -
                </div>

            </div>

        </div>

        <!-- JOURNAL -->

        <h1 class="section-title">
            Arsip Jurnal
        </h1>

        <div class="journal-grid"
        id="journalGrid"></div>

        <!-- BRIGADO TEAM -->

        <div class="brigado-team">

            <h2 class="team-title">
                Brigado Team
            </h2>

            <div class="team-grid">

                <a
                href="https://t.me/afteryourlife"
                target="_blank"
                class="team-card"
                >

                    <div class="tele-icon">
                        <i class="fa-brands fa-telegram"></i>
                    </div>

                    <div class="team-info">

                        <span class="team-name">
                            Gabriel
                        </span>

                        <span class="team-role">
                            Founder & Writer
                        </span>

                    </div>

                </a>

                <a
                href="https://t.me/beforeyourlife"
                target="_blank"
                class="team-card"
                >

                    <div class="tele-icon">
                        <i class="fa-brands fa-telegram"></i>
                    </div>

                    <div class="team-info">

                        <span class="team-name">
                            Nayoung
                        </span>

                        <span class="team-role">
                            Designer
                        </span>

                    </div>

                </a>

                <a
                href="https://t.me/ifyousmile"
                target="_blank"
                class="team-card"
                >

                    <div class="tele-icon">
                        <i class="fa-brands fa-telegram"></i>
                    </div>

                    <div class="team-info">

                        <span class="team-name">
                            Melvin
                        </span>

                        <span class="team-role">
                            Fixed Errors
                        </span>

                    </div>

                </a>

            </div>

        </div>

        <!-- FOOTER -->

        <div class="footer">

            © 2026 Brigado Team — Dark Aesthetic Journal

        </div>

    </main>

</div>

<script>

/* PROFILE */

const profileUpload =
document.getElementById('profileUpload');

const profilePic =
document.getElementById('profilePic');

const defaultProfile =
'https://i.imgur.com/8Q89fF4.jpg';

const savedProfile =
localStorage.getItem('gentleman_profile');

profilePic.src =
savedProfile ? savedProfile : defaultProfile;

profileUpload.addEventListener('change', function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            profilePic.src = e.target.result;

            localStorage.setItem(
                'gentleman_profile',
                e.target.result
            );

        }

        reader.readAsDataURL(file);

    }

});

/* CLOCK */

function updateClock(){

    const now = new Date();

    document.getElementById('clockTime').innerHTML =
    now.toLocaleTimeString('id-ID');

    document.getElementById('clockDate').innerHTML =
    now.toLocaleDateString('id-ID', {
        weekday:'long',
        day:'numeric',
        month:'long',
        year:'numeric'
    });

}

setInterval(updateClock, 1000);

updateClock();

/* JOURNAL */

let journals =
JSON.parse(
localStorage.getItem('gentleman_journals')
) || [];

function updateStats(){

    document.getElementById('totalJournal').innerHTML =
    journals.length;

    document.getElementById('lastMood').innerHTML =
    journals.length > 0
    ? journals[0].category
    : '-';
}

function renderJournals(data = journals){

    const grid =
    document.getElementById('journalGrid');

    grid.innerHTML = '';

    if(data.length === 0){

        grid.innerHTML = `
        <p style="
        color:var(--text-secondary);
        font-family:var(--font-serif);
        font-size:1.2rem;
        ">
        Belum ada jurnal yang ditulis.
        </p>
        `;

        return;
    }

    data.forEach(j => {

        const card =
        document.createElement('div');

        card.className = 'journal-card';

        card.innerHTML = `

        <div class="card-header">

            <span class="category-tag">
                ${j.category}
            </span>

        </div>

        <h3 class="card-title">
            ${j.title}
        </h3>

        <p class="card-body">
            ${j.content}
        </p>

        <div class="card-footer">

            <span class="card-date">
                ${j.date}
            </span>

            <div class="card-actions">

                <button
                class="btn-edit"
                onclick="editJournal(${j.id})"
                >
                    Edit
                </button>

                <button
                class="btn-delete"
                onclick="deleteJournal(${j.id})"
                >
                    Hapus
                </button>

            </div>

        </div>
        `;

        grid.appendChild(card);

    });

    updateStats();

}

function saveJournal(){

    const idInput =
    document.getElementById('editId').value;

    const category =
    document.getElementById('category').value;

    const title =
    document.getElementById('title').value;

    const content =
    document.getElementById('content').value;

    if(!title.trim() || !content.trim()){

        alert("Judul dan isi jurnal tidak boleh kosong.");

        return;
    }

    if(idInput){

        const index =
        journals.findIndex(j => j.id == idInput);

        if(index !== -1){

            journals[index].category = category;
            journals[index].title = title;
            journals[index].content = content;

        }

    } else {

        const newEntry = {

            id:Date.now(),

            category,

            title,

            content,

            date:
            new Date().toLocaleDateString(
            'id-ID',
            {
                day:'numeric',
                month:'long',
                year:'numeric'
            })

        };

        journals.unshift(newEntry);

    }

    localStorage.setItem(
        'gentleman_journals',
        JSON.stringify(journals)
    );

    cancelEdit();

    renderJournals();
}

function editJournal(id){

    const journal =
    journals.find(j => j.id === id);

    if(!journal) return;

    document.getElementById('editId').value =
    journal.id;

    document.getElementById('category').value =
    journal.category;

    document.getElementById('title').value =
    journal.title;

    document.getElementById('content').value =
    journal.content;

    document.getElementById('formHeader').innerText =
    "Edit Jurnal";

    document.getElementById('saveBtn').innerText =
    "Simpan Perubahan";

    document.getElementById('cancelBtn').style.display =
    "inline-block";

    window.scrollTo({
        top:0,
        behavior:'smooth'
    });
}

function cancelEdit(){

    document.getElementById('editId').value = '';

    document.getElementById('title').value = '';

    document.getElementById('content').value = '';

    document.getElementById('formHeader').innerText =
    "Tulis Jurnal Baru";

    document.getElementById('saveBtn').innerText =
    "Simpan Entri";

    document.getElementById('cancelBtn').style.display =
    "none";
}

function deleteJournal(id){

    const confirmDelete =
    confirm(
    "Jurnal akan dihapus permanen. Lanjutkan?"
    );

    if(confirmDelete){

        journals =
        journals.filter(j => j.id !== id);

        localStorage.setItem(
        'gentleman_journals',
        JSON.stringify(journals)
        );

        renderJournals();

    }
}

/* SEARCH */

function searchJournal(){

    const keyword =
    document.getElementById('searchInput')
    .value
    .toLowerCase();

    const filtered =
    journals.filter(j =>

        j.title.toLowerCase().includes(keyword)
        ||
        j.content.toLowerCase().includes(keyword)
        ||
        j.category.toLowerCase().includes(keyword)

    );

    renderJournals(filtered);
}

renderJournals();

</script>

</body>
</html>
