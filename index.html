<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>The Gentleman's Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

:root{

    --accent-gold:#c5a059;
    --accent-soft:#f5d48f;

    --text-primary:#f8f8f8;
    --text-secondary:#b5b5c3;

    --glass-bg:rgba(18,18,22,.62);
    --glass-border:rgba(255,255,255,.08);

    --font-serif:'Cormorant Garamond', serif;
    --font-sans:'Inter', sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{

    font-family:var(--font-sans);

    background:
    radial-gradient(circle at top left, rgba(197,160,89,.12), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,255,255,.04), transparent 25%),
    linear-gradient(rgba(5,5,8,.82), rgba(5,5,8,.94)),
    url('https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=2070&auto=format&fit=crop')
    no-repeat center center fixed;

    background-size:cover;

    min-height:100vh;

    color:var(--text-primary);

    overflow-x:hidden;

    opacity:0;
}

/* TOAST */

.toast{

    position:fixed;

    bottom:30px;
    right:30px;

    padding:16px 22px;

    border-radius:18px;

    background:
    linear-gradient(
    145deg,
    rgba(30,30,34,.95),
    rgba(18,18,20,.88)
    );

    border:1px solid rgba(255,255,255,.08);

    color:white;

    font-size:.9rem;

    backdrop-filter:blur(25px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45);

    opacity:0;
    pointer-events:none;

    transform:translateY(20px);

    transition:.4s ease;

    z-index:9999;
}

.toast.show{

    opacity:1;

    transform:translateY(0);
}

.layout-wrapper{

    width:100%;
    max-width:1450px;

    margin:auto;

    min-height:100vh;

    display:flex;
    flex-direction:column;

    backdrop-filter:blur(20px);
}

.sidebar{

    width:100%;

    padding:60px 30px;

    background:rgba(15,15,18,.58);

    backdrop-filter:blur(40px);

    display:flex;
    flex-direction:column;
    align-items:center;
}

.profile-container{

    position:relative;

    width:155px;
    height:155px;

    border-radius:50%;

    padding:5px;

    margin-bottom:30px;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    rgba(197,160,89,.95),
    rgba(255,255,255,.15),
    rgba(197,160,89,.3)
    );

    animation:floatProfile 5s ease-in-out infinite;
}

@keyframes floatProfile{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0);
    }
}

.profile-img{

    width:100%;
    height:100%;

    border-radius:50%;

    object-fit:cover;
}

.profile-overlay{

    position:absolute;

    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:.4s ease;

    background:rgba(0,0,0,.5);

    border-radius:50%;
}

.profile-container:hover .profile-overlay{
    opacity:1;
}

.user-name{

    font-family:var(--font-serif);

    font-size:2rem;

    margin-bottom:8px;
}

.user-bio{

    color:var(--accent-gold);

    letter-spacing:3px;

    font-size:.85rem;
}

.live-clock{

    margin-top:30px;

    width:100%;

    padding:20px;

    border-radius:24px;

    background:rgba(255,255,255,.04);

    text-align:center;
}

.clock-time{

    font-size:2rem;

    font-weight:700;
}

.clock-date{

    margin-top:8px;

    color:var(--text-secondary);
}

.music-player{

    margin-top:30px;

    width:100%;

    padding:25px;

    border-radius:24px;

    background:rgba(255,255,255,.04);
}

.music-player audio{
    width:100%;
}

.main-content{

    flex:1;

    padding:45px 25px;

    background:rgba(8,8,10,.45);
}

.section-title{

    font-family:var(--font-serif);

    font-size:3rem;

    margin-bottom:35px;
}

.search-input,
.form-input,
.form-textarea,
.form-select{

    width:100%;

    background:rgba(0,0,0,.35);

    border:1px solid rgba(255,255,255,.06);

    color:white;

    padding:18px 20px;

    border-radius:18px;

    outline:none;

    margin-bottom:20px;
}

.form-textarea{

    height:180px;

    resize:none;
}

.btn{

    background:
    linear-gradient(
    135deg,
    #f5d48f,
    #c5a059
    );

    color:#111;

    border:none;

    padding:15px 35px;

    border-radius:16px;

    cursor:pointer;

    font-weight:700;
}

.btn-cancel{

    background:transparent;

    color:white;

    border:1px solid rgba(255,255,255,.08);

    margin-left:10px;
}

.stats-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin:50px 0;
}

.stat-card{

    padding:30px;

    border-radius:24px;

    background:rgba(255,255,255,.04);
}

.stat-number{

    margin-top:10px;

    font-size:2rem;

    font-weight:700;
}

.journal-grid{

    display:grid;

    grid-template-columns:1fr;

    gap:28px;
}

.journal-card{

    background:rgba(255,255,255,.04);

    padding:35px;

    border-radius:26px;

    animation:fadeUp .6s ease;
}

.card-title{

    font-family:var(--font-serif);

    font-size:2rem;

    margin:15px 0;
}

.card-body{

    color:var(--text-secondary);

    line-height:1.8;

    white-space:pre-line;
}

.card-footer{

    display:flex;

    justify-content:space-between;

    margin-top:25px;
}

.category-tag{

    color:var(--accent-gold);
}

.card-actions button{

    background:none;

    border:none;

    color:white;

    margin-left:15px;

    cursor:pointer;
}

.empty-state{

    text-align:center;

    padding:80px 20px;

    color:var(--text-secondary);
}

.empty-state i{

    font-size:3rem;

    margin-bottom:20px;

    color:rgba(197,160,89,.5);
}

.footer{

    margin-top:60px;

    text-align:center;

    color:var(--text-secondary);
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="layout-wrapper">

<aside class="sidebar">

<div class="profile-container"
onclick="document.getElementById('profileUpload').click()">

<img src=""
id="profilePic"
class="profile-img">

<div class="profile-overlay">
Ubah Foto
</div>

</div>

<input type="file"
id="profileUpload"
accept="image/*"
hidden>

<h2 class="user-name">
The Journal
</h2>

<p class="user-bio">
Brigado Team
</p>

<div class="live-clock">

<div class="clock-time" id="clockTime">
00:00:00
</div>

<div class="clock-date" id="clockDate">
Loading...
</div>

</div>

<div class="music-player">

<div class="music-title">
Ambient Music
</div>

<audio controls loop>

<source
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8d79c9f65.mp3?filename=beautiful-piano-ambient-110624.mp3"
type="audio/mp3">

</audio>

</div>

</aside>

<main class="main-content">

<h1 class="section-title" id="formHeader">
Tulis Jurnal Baru
</h1>

<input
type="text"
id="searchInput"
class="search-input"
placeholder="Cari journal..."
onkeyup="searchJournal()"
>

<input type="hidden" id="editId">

<select id="category"
class="form-select">

<option value="Kebahagiaan">
Kebahagiaan
</option>

<option value="Kesedihan">
Kesedihan
</option>

<option value="Kebencian">
Kebencian
</option>

<option value="Kekecewaan">
Kekecewaan
</option>

</select>

<input
type="text"
id="title"
class="form-input"
placeholder="Masukkan judul journal..."
>

<textarea
id="content"
class="form-textarea"
placeholder="Tuliskan isi journalmu..."
></textarea>

<button class="btn"
id="saveBtn"
onclick="saveJournal()">
Simpan Entri
</button>

<button
class="btn btn-cancel"
id="cancelBtn"
onclick="cancelEdit()"
style="display:none;">
Batal
</button>

<div class="stats-grid">

<div class="stat-card">

<div>Total Journal</div>

<div class="stat-number" id="totalJournal">
0
</div>

</div>

<div class="stat-card">

<div>Last Mood</div>

<div class="stat-number" id="lastMood">
-
</div>

</div>

</div>

<h1 class="section-title">
Arsip Journal
</h1>

<div class="journal-grid"
id="journalGrid"></div>

<div class="footer">
© 2026 Brigado Team — Dark Aesthetic Journal
</div>

</main>

</div>

<script>

/* PROFILE */

const profileUpload =
document.getElementById('profileUpload');

const profilePic =
document.getElementById('profilePic');

const defaultProfile =
'https://i.imgur.com/8Q89fF4.jpg';

const savedProfile =
localStorage.getItem('gentleman_profile');

profilePic.src =
savedProfile ? savedProfile : defaultProfile;

profileUpload.addEventListener('change', function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

profilePic.src = e.target.result;

localStorage.setItem(
'gentleman_profile',
e.target.result
);

}

reader.readAsDataURL(file);

}

});

/* TOAST */

function showToast(message){

const toast =
document.getElementById('toast');

toast.innerText = message;

toast.classList.add('show');

setTimeout(() => {

toast.classList.remove('show');

}, 2500);

}

/* CLOCK */

function updateClock(){

const now = new Date();

document.getElementById('clockTime').innerHTML =
now.toLocaleTimeString('id-ID');

document.getElementById('clockDate').innerHTML =
now.toLocaleDateString('id-ID', {
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

setInterval(updateClock, 1000);

updateClock();

/* JOURNAL */

let journals =
JSON.parse(
localStorage.getItem('gentleman_journals')
) || [];

function updateStats(){

document.getElementById('totalJournal').innerHTML =
journals.length;

document.getElementById('lastMood').innerHTML =
journals.length > 0
? journals[0].category
: '-';

}

function renderJournals(data = journals){

const grid =
document.getElementById('journalGrid');

grid.innerHTML = '';

if(data.length === 0){

grid.innerHTML = `

<div class="empty-state">

<i class="fa-regular fa-face-sad-tear"></i>

<h2>
Belum Ada Journal
</h2>

<p>
Tulis cerita pertamamu di sini.
</p>

</div>

`;

updateStats();

return;

}

data.forEach(j => {

const card =
document.createElement('div');

card.className =
'journal-card';

card.innerHTML = `

<div class="category-tag">
${j.category}
</div>

<h3 class="card-title">
${j.title}
</h3>

<p class="card-body">
${j.content}
</p>

<div class="card-footer">

<span>
${j.date}
</span>

<div class="card-actions">

<button
onclick="editJournal(${j.id})">
Edit
</button>

<button
onclick="deleteJournal(${j.id})">
Hapus
</button>

</div>

</div>

`;

grid.appendChild(card);

});

updateStats();

}

function saveJournal(){

const idInput =
document.getElementById('editId').value;

const category =
document.getElementById('category').value;

const title =
document.getElementById('title').value;

const content =
document.getElementById('content').value;

if(!title.trim() || !content.trim()){

showToast(
"Judul dan isi wajib diisi."
);

return;

}

if(idInput){

const index =
journals.findIndex(j => j.id == idInput);

if(index !== -1){

journals[index].category = category;
journals[index].title = title;
journals[index].content = content;

}

showToast("Journal diperbarui.");

} else {

const newEntry = {

id:Date.now(),

category,

title,

content,

date:
new Date().toLocaleDateString(
'id-ID',
{
day:'numeric',
month:'long',
year:'numeric'
})

};

journals.unshift(newEntry);

showToast("Journal disimpan.");

}

localStorage.setItem(
'gentleman_journals',
JSON.stringify(journals)
);

cancelEdit();

renderJournals();

}

function editJournal(id){

const journal =
journals.find(j => j.id === id);

if(!journal) return;

document.getElementById('editId').value =
journal.id;

document.getElementById('category').value =
journal.category;

document.getElementById('title').value =
journal.title;

document.getElementById('content').value =
journal.content;

document.getElementById('formHeader').innerText =
"Edit Journal";

document.getElementById('saveBtn').innerText =
"Simpan Perubahan";

document.getElementById('cancelBtn').style.display =
"inline-block";

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function cancelEdit(){

document.getElementById('editId').value = '';

document.getElementById('title').value = '';

document.getElementById('content').value = '';

document.getElementById('formHeader').innerText =
"Tulis Journal Baru";

document.getElementById('saveBtn').innerText =
"Simpan Entri";

document.getElementById('cancelBtn').style.display =
"none";

}

function deleteJournal(id){

const confirmDelete =
confirm(
"Journal akan dihapus permanen."
);

if(confirmDelete){

journals =
journals.filter(j => j.id !== id);

localStorage.setItem(
'gentleman_journals',
JSON.stringify(journals)
);

renderJournals();

showToast("Journal dihapus.");

}

}

function searchJournal(){

const keyword =
document.getElementById('searchInput')
.value
.toLowerCase();

const filtered =
journals.filter(j =>

j.title.toLowerCase().includes(keyword)
||
j.content.toLowerCase().includes(keyword)
||
j.category.toLowerCase().includes(keyword)

);

renderJournals(filtered);

}

window.addEventListener('load', () => {

setTimeout(() => {

document.body.style.transition =
'opacity .8s ease';

document.body.style.opacity = '1';

}, 100);

});

renderJournals();

</script>

</body>
</html>
